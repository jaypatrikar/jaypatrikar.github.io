<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Rome &amp; Amalfi Coast</title>
<style>
  /*
    Deliberately single-theme: a white-and-pastel, hand-tied-bouquet look.
    Inverting this to a dark palette would undo the point of it, so the
    same soft palette is kept under prefers-color-scheme/data-theme rather
    than flipping to a dark ground.
  */
  :root, :root[data-theme="dark"], :root[data-theme="light"] {
    --bg: #f6efe3;
    --bg-raised: #fffbf3;
    --ink: #5c4a53;
    --ink-soft: #ad93a0;
    --line: #ecdfd0;
    --rome: #e0879e;
    --rome-soft: #fbeae2;
    --sea: #96b9a3;
    --sea-soft: #eef3e6;
    --gold: #d9b56e;
    --lavender: #c9b7db;
    --lemon: #eecb5e;
    --lemon-leaf: #a3c08a;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: inherit; }
  button { font: inherit; }

  /* ---------- Gate ---------- */
  #gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, var(--rome-soft), var(--bg) 65%);
  }
  #gate-card {
    width: 100%;
    max-width: 320px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px 28px 30px;
    box-shadow: 0 20px 50px -25px rgba(150, 100, 120, 0.28);
    text-align: center;
  }
  .route { position: relative; height: 34px; margin: 0 auto 20px; max-width: 220px; }
  .route svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .route .dashes { stroke: var(--gold); stroke-width: 1.5; stroke-dasharray: 3 5; fill: none; }
  .route .plane {
    fill: var(--ink); transform-box: fill-box; transform-origin: center;
    animation: fly 3.2s ease-in-out infinite;
  }
  @keyframes fly {
    0%   { transform: translate(0px, 0px) rotate(6deg); opacity: 0; }
    8%   { opacity: 1; }
    50%  { transform: translate(51px, -21px) rotate(6deg); opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translate(102px, 0px) rotate(6deg); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .route .plane { animation: none; transform: translate(51px, -21px) rotate(6deg); }
  }
  #gate form { display: flex; flex-direction: column; gap: 12px; }
  #gate p.label {
    text-transform: uppercase; letter-spacing: 0.14em; font-size: 11.5px;
    color: var(--rome); font-weight: 700; margin: 0 0 2px;
  }
  #gate h2 {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-size: 22px; margin: 0 0 16px; line-height: 1.25;
  }
  #gate input {
    font-size: 16px; padding: 13px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); text-align: center; letter-spacing: 0.04em;
  }
  #gate input:focus { outline: 2px solid var(--rome); outline-offset: 1px; }
  #gate button.submit {
    font-size: 15px; font-weight: 600; padding: 13px 14px; border-radius: 10px; border: none;
    background: var(--rome); color: #fff8f2; cursor: pointer;
  }
  #gate button.submit:active { transform: scale(0.98); }
  #gate button.submit:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  #gate .error { color: var(--rome); font-size: 13px; min-height: 16px; margin: 2px 0 0; }

  /* ---------- App shell ---------- */
  #content { display: none; }
  #view { animation: fadein 0.32s ease both; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    #view { animation: none; }
  }

  .hero {
    position: relative; padding: 56px 20px 36px; text-align: center;
    background: linear-gradient(180deg, var(--rome-soft), transparent 75%);
    overflow: hidden;
  }
  .hero.compact { padding: 26px 20px 22px; }
  .hero .florals { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .hero .inner { position: relative; z-index: 1; }
  .eyebrow {
    text-transform: uppercase; letter-spacing: 0.18em; font-size: 12px;
    color: var(--rome); font-weight: 700; margin: 0 0 12px;
  }
  h1 {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    font-size: 40px; line-height: 1.1; margin: 0 0 10px; text-wrap: balance; letter-spacing: -0.01em;
  }
  .subtitle { font-family: Georgia, "Palatino Linotype", serif; font-style: italic; color: var(--ink-soft); font-size: 17px; margin: 0 0 6px; }
  .dates { color: var(--ink-soft); font-size: 14px; font-variant-numeric: tabular-nums; letter-spacing: 0.03em; }
  .rule-flowers { width: 92px; height: auto; margin: 22px auto 0; display: block; }

  .page { max-width: 620px; margin: 0 auto; padding: 8px 16px 80px; }

  /* breadcrumb / back link */
  .back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13.5px; font-weight: 600; color: var(--rome);
    text-decoration: none; padding: 6px 2px; margin-bottom: 4px;
  }
  .back svg { width: 15px; height: 15px; }
  .crumbs { font-size: 12.5px; color: var(--ink-soft); margin: 2px 0 18px; }
  .crumbs a { color: var(--ink-soft); text-decoration: underline; text-decoration-color: var(--line); text-underline-offset: 2px; }

  /* ---- Overview: list of days ---- */
  .timeline { position: relative; display: flex; flex-direction: column; gap: 0; padding-top: 12px; }
  .timeline::before { content: ""; position: absolute; top: 8px; bottom: 8px; left: 5px; width: 1px; background: var(--line); }
  .leg { position: relative; padding: 0 0 6px 30px; }
  .leg::before {
    content: ""; position: absolute; left: 0; top: 7px; width: 11px; height: 11px;
    border-radius: 50%; background: var(--bg-raised); border: 2px solid var(--dot, var(--rome));
  }
  .leg.sea { --dot: var(--sea); }

  .day-link {
    display: block; text-decoration: none; color: inherit;
    background: var(--bg-raised); border: 1px solid var(--line); border-left: 3px solid var(--dot, var(--rome));
    border-radius: 4px 12px 12px 4px; padding: 15px 16px; margin-bottom: 24px;
  }
  .day-link:active { transform: scale(0.99); }
  .leg-when { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; margin-bottom: 4px; color: var(--dot, var(--rome)); }
  .leg-title {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-size: 21px; margin: 0 0 6px; text-wrap: balance; line-height: 1.2;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .leg-title .lt-left { display: flex; align-items: center; gap: 8px; }
  .leg-title .deco { width: 19px; height: 19px; flex-shrink: 0; }
  .leg-title .chev { width: 16px; height: 16px; color: var(--ink-soft); flex-shrink: 0; }
  .leg-sub { font-size: 13.5px; color: var(--ink-soft); }
  .leg-sub .count { font-variant-numeric: tabular-nums; }

  /* ---- Day view: list of events ---- */
  .event-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .event-link {
    display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px;
  }
  .event-link:active { transform: scale(0.99); }
  .event-icon {
    flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--dot-soft, var(--rome-soft)); color: var(--dot, var(--rome));
  }
  .event-icon svg { width: 17px; height: 17px; }
  .event-text { flex: 1; min-width: 0; }
  .event-title { font-weight: 600; font-size: 14.5px; }
  .event-meta { font-size: 12.5px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .event-link .chev { width: 15px; height: 15px; color: var(--ink-soft); flex-shrink: 0; }
  .day-note {
    margin-top: 16px; padding: 12px 14px; border-radius: 10px;
    background: var(--sea-soft); color: var(--ink); font-size: 13.5px; font-style: italic;
    display: flex; gap: 8px; align-items: flex-start;
  }

  /* ---- Event view: detail card ---- */
  .event-hero { display: flex; align-items: center; gap: 12px; margin: 6px 0 18px; }
  .event-hero .event-icon { width: 46px; height: 46px; }
  .event-hero .event-icon svg { width: 21px; height: 21px; }
  .event-hero h2 {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-size: 23px; margin: 0; line-height: 1.2; text-wrap: balance;
  }
  .event-hero .event-kicker { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dot, var(--rome)); font-weight: 700; margin-bottom: 3px; }

  .card {
    background: var(--bg-raised); border: 1px solid var(--line); border-left: 3px solid var(--dot, var(--rome));
    border-radius: 4px 12px 12px 4px; padding: 16px 17px; font-size: 14.5px; color: var(--ink-soft);
    display: flex; flex-direction: column; gap: 8px;
  }
  .card strong { color: var(--ink); font-weight: 600; }
  .card .row { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .code {
    font-variant-numeric: tabular-nums; background: var(--dot-soft, var(--rome-soft)); color: var(--dot, var(--rome));
    padding: 2px 8px; border-radius: 5px; font-size: 12.5px; font-weight: 700; letter-spacing: 0.02em; display: inline-block;
  }
  .note { font-style: italic; color: var(--ink-soft); font-size: 13.5px; }
  .field-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); margin-bottom: 1px; }

  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .btn {
    flex: 1 1 auto; min-width: 0; text-align: center; text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 10px 12px; border-radius: 8px; background: var(--bg); border: 1px solid var(--line); color: var(--ink);
    display: flex; align-items: center; justify-content: center; gap: 6px; min-height: 40px;
  }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .btn:active { transform: scale(0.97); }

  .stub {
    margin-top: 18px; padding: 13px 14px; border: 1px dashed var(--line); border-radius: 10px;
    font-size: 13px; color: var(--ink-soft); font-style: italic;
  }

  footer {
    max-width: 620px; margin: 48px auto 0; padding: 20px 16px 40px; border-top: 1px solid var(--line);
    font-size: 13px; color: var(--ink-soft); text-align: center;
  }

  @media (max-width: 480px) {
    h1 { font-size: 30px; }
    .subtitle { font-size: 15px; }
    .leg-title { font-size: 19px; }
    .hero { padding: 44px 16px 30px; }
  }
</style>
</head>
<body>

<div id="gate">
  <div id="gate-card">
    <div class="route">
      <svg viewBox="0 0 114 30">
        <defs>
          <g id="blossom">
            <circle cx="0" cy="-4.2" r="3.1"/><circle cx="4" cy="-1.3" r="3.1"/><circle cx="2.5" cy="3.4" r="3.1"/>
            <circle cx="-2.5" cy="3.4" r="3.1"/><circle cx="-4" cy="-1.3" r="3.1"/><circle cx="0" cy="0" r="2" fill="var(--gold)"/>
          </g>
        </defs>
        <path class="dashes" d="M6 24 Q 57 -6 108 24"/>
        <use href="#blossom" x="6" y="24" fill="var(--rome)" transform="scale(0.6)" style="transform-origin:6px 24px"/>
        <use href="#blossom" x="108" y="24" fill="var(--sea)" transform="scale(0.6)" style="transform-origin:108px 24px"/>
        <g class="plane"><path d="M0 4 L11 4.7 L18 -0.5 L20.3 0 L16.7 6 L21 8.7 L21 10.3 L15.3 9 L11.8 12.6 L9.3 12 L11 7.3 L0 5.6 Z" transform="translate(-1 -6) rotate(6)"/></g>
      </svg>
    </div>
    <p class="label">Private itinerary</p>
    <h2>Roma &amp; Amalfi<br>await</h2>
    <form id="gate-form" autocomplete="off">
      <input type="password" id="pw" name="pw" autofocus inputmode="text" placeholder="Password">
      <button type="submit" class="submit">Unlock</button>
      <p class="error" id="gate-error"></p>
    </form>
  </div>
</div>

  </svg>

  <div id="view"></div>

  <footer>Jay &amp; Suchita &middot; last updated 12 July 2026</footer>
</div>

<script>

  ========================================================= */
  var CORRECT_HASH = "8281c89a7c6190cc3c98a8a0a718e259048670175a2a3b1fc1d491277f684b24";
  var SESSION_KEY = "honeymoon-unlocked";

  function sha256Hex(text) {
    var enc = new TextEncoder().encode(text);
    return crypto.subtle.digest("SHA-256", enc).then(function (buf) {
      return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, "0"); }).join("");
    });
  }
  function revealApp() {
    document.getElementById("gate").style.display = "none";
    document.getElementById("content").style.display = "block";
    route();
  }
  if (sessionStorage.getItem(SESSION_KEY) === "1") revealApp();

  document.getElementById("gate-form").addEventListener("submit", function (e) {
    e.preventDefault();
    var val = document.getElementById("pw").value;
    sha256Hex(val).then(function (hash) {
      if (hash === CORRECT_HASH) {
        sessionStorage.setItem(SESSION_KEY, "1");
        revealApp();

        document.getElementById("gate-error").textContent = "Wrong password";

            confirmation: "HMSFXQ5BZQ", host: "Giovanni", phone: "+393208269229", phoneDisplay: "+39 320 826 9229",
            address: "Via Alessio Mazzocchi 12, Naples", mapQuery: "Via+Alessio+Mazzocchi+12+Naples+Italy", pdf: "honeymoon-files/naples-giovanni.pdf",
            detail: { "Check-in": "4:00 PM, Sat 5 Sep", "Checkout": "11:00 AM, Sun 6 Sep", "Address": "Via Alessio Mazzocchi 12, Naples" } }
        ]
      },
      {
        id: "nap-ams", when: "SUN 6 SEP", title: "Naples → Amsterdam", theme: "sea",
        note: "Back with Suchita's cousin through Sep 13",
        events: [
          { id: "eju4235", type: "flight", title: "EJU4235", time: "4:20 – 7:00 PM", summary: "NAP → AMS · 4:20 PM",
            confirmation: "KCV26LM",
            detail: { "Route": "Naples (NAP) → Amsterdam (AMS)", "Flight": "EJU4235", "Carrier": "easyJet", "Departs": "4:20 PM, Sun 6 Sep", "Arrives": "7:00 PM, Sun 6 Sep" } }
        ]
      },
      {
        id: "ams-pit", when: "SUN 13 SEP", title: "Amsterdam → Pittsburgh", theme: "rome",
        events: [
          { id: "dl0133", type: "flight", title: "DL0133", time: "9:20 AM", summary: "AMS → DTW · 9:20 AM",
            detail: { "Route": "Amsterdam (AMS) → Detroit (DTW)", "Flight": "DL0133", "Carrier": "Delta", "Departs": "9:20 AM, Sun 13 Sep" } },
          { id: "dl4640", type: "flight", title: "DL4640", time: "2:15 PM", summary: "DTW → PIT · 2:15 PM",
            detail: { "Route": "Detroit (DTW) → Pittsburgh (PIT)", "Flight": "DL4640", "Carrier": "Delta", "Departs": "2:15 PM, Sun 13 Sep" } }
        ]
      }
    ]
  };

  /* =========================================================
     HELPERS
  ========================================================= */
  function findDay(id) { for (var i = 0; i < TRIP.days.length; i++) if (TRIP.days[i].id === id) return TRIP.days[i]; return null; }
  function findEvent(day, id) { if (!day) return null; for (var i = 0; i < day.events.length; i++) if (day.events[i].id === id) return day.events[i]; return null; }
  function esc(s) { return String(s == null ? "" : s); }

  function decoIcon(deco, cls) {
    if (deco === "lemon") return '<svg class="' + cls + '" viewBox="0 0 20 20"><use href="#lemonfruit" x="10" y="10" fill="var(--lemon)" transform="scale(0.85)" style="transform-origin:10px 10px"/></svg>';
    if (deco === "boat") return '<svg class="' + cls + '" viewBox="0 0 20 20"><use href="#sailboat" x="10" y="10" fill="var(--sea)" color="var(--sea)" transform="scale(0.75)" style="transform-origin:10px 10px"/></svg>';
    if (deco === "flower") return '<svg class="' + cls + '" viewBox="0 0 20 20"><use href="#bloom" x="10" y="10" fill="var(--rome)" transform="scale(1.1)" style="transform-origin:10px 10px"/></svg>';
    return "";
  }

  function eventIconId(type) {
    if (type === "flight") return "icon-plane";
    if (type === "stay") return "icon-stay";
    return "icon-activity";
  }

  function chevron() { return '<svg class="chev" viewBox="0 0 24 24"><use href="#icon-chevron"/></svg>'; }
  function backChevron() { return '<svg viewBox="0 0 24 24"><use href="#icon-back"/></svg>'; }

  function heroFlorals() {
    return '<svg class="florals" viewBox="0 0 400 220" preserveAspectRatio="xMidYMid slice">' +
      '<use href="#bloom" x="34" y="30" fill="var(--rome)" opacity="0.55"/>' +
      '<use href="#leaf" x="20" y="34" fill="var(--sea)" opacity="0.5" transform="rotate(-20 20 34)"/>' +
      '<use href="#bloom" x="70" y="16" fill="var(--lavender)" opacity="0.45" transform="scale(0.7)" style="transform-origin:70px 16px"/>' +
      '<use href="#bloom" x="360" y="34" fill="var(--rome)" opacity="0.55"/>' +
      '<use href="#leaf" x="368" y="40" fill="var(--sea)" opacity="0.5" transform="rotate(160 368 40)"/>' +
      '<use href="#bloom" x="330" y="14" fill="var(--gold)" opacity="0.5" transform="scale(0.65)" style="transform-origin:330px 14px"/>' +
      '<use href="#bloom" x="8" y="90" fill="var(--sea)" opacity="0.35" transform="scale(0.8)" style="transform-origin:8px 90px"/>' +
      '<use href="#bloom" x="392" y="100" fill="var(--lavender)" opacity="0.35" transform="scale(0.8)" style="transform-origin:392px 100px"/>' +
      '<use href="#bloom" x="52" y="66" fill="var(--gold)" opacity="0.4" transform="scale(0.55)" style="transform-origin:52px 66px"/>' +
      '<use href="#bloom" x="345" y="70" fill="var(--sea)" opacity="0.4" transform="scale(0.55)" style="transform-origin:345px 70px"/>' +
      '<use href="#lemonfruit" x="18" y="60" fill="var(--lemon)" opacity="0.6" transform="rotate(-15 18 60) scale(0.9)" style="transform-origin:18px 60px"/>' +
      '<use href="#lemonfruit" x="384" y="62" fill="var(--lemon)" opacity="0.6" transform="rotate(12 384 62) scale(0.85)" style="transform-origin:384px 62px"/>' +
      '<use href="#sailboat" x="200" y="132" fill="var(--sea)" color="var(--sea)" opacity="0.5" transform="scale(1.1)" style="transform-origin:200px 132px"/>' +
      '</svg>';
  }

  /* =========================================================
     VIEWS
  ========================================================= */
  function viewOverview() {
    var rows = TRIP.days.map(function (day) {
      return '<div class="leg ' + (day.theme === "sea" ? "sea" : "") + '">' +
        '<a class="day-link" href="#/day/' + day.id + '">' +
          '<div class="leg-when">' + esc(day.when) + '</div>' +
          '<h2 class="leg-title"><span class="lt-left">' + decoIcon(day.deco, "deco") + esc(day.title) + '</span>' + chevron() + '</h2>' +
          '<div class="leg-sub"><span class="count">' + day.events.length + '</span> event' + (day.events.length === 1 ? "" : "s") + (day.note ? ' &middot; has a note' : '') + '</div>' +
        '</a>' +
      '</div>';
    }).join("");

    return '<div class="hero">' + heroFlorals() +
      '<div class="inner">' +
        '<p class="eyebrow">Honeymoon &middot; Italia</p>' +
        '<h1>' + TRIP.title + '</h1>' +
        '<p class="subtitle">' + TRIP.subtitle + '</p>' +
        '<p class="dates">' + TRIP.dates + '</p>' +
        '<svg class="rule-flowers" viewBox="0 0 92 14"><use href="#bloom" x="46" y="7" fill="var(--rome)" transform="scale(0.75)" style="transform-origin:46px 7px"/><path d="M50 7h34M8 7h34" stroke="var(--gold)" stroke-width="1.2" stroke-dasharray="1.5 4" stroke-linecap="round"/></svg>' +
      '</div></div>' +
      '<div class="page"><div class="timeline">' + rows + '</div></div>';
  }

  function viewDay(dayId) {
    var day = findDay(dayId);
    if (!day) return viewNotFound();

    var events = day.events.map(function (ev) {
      var dotSoft = day.theme === "sea" ? "var(--sea-soft)" : "var(--rome-soft)";
      var dot = day.theme === "sea" ? "var(--sea)" : "var(--rome)";
      return '<a class="event-link" href="#/day/' + day.id + '/event/' + ev.id + '" style="--dot:' + dot + ';--dot-soft:' + dotSoft + '">' +
        '<span class="event-icon"><svg viewBox="0 0 24 24"><use href="#' + eventIconId(ev.type) + '"/></svg></span>' +
        '<span class="event-text"><span class="event-title">' + esc(ev.title) + '</span><br><span class="event-meta">' + esc(ev.summary) + '</span></span>' +
        chevron() +
      '</a>';
    }).join("");

    var note = day.note ? '<div class="day-note">&#127811; ' + day.note + '</div>' : "";

    return '<div class="hero compact ' + (day.theme === "sea" ? "" : "") + '">' + heroFlorals() +
      '<div class="inner">' +
        '<a class="back" href="#/">' + backChevron() + ' All days</a>' +
        '<p class="eyebrow">' + esc(day.when) + '</p>' +
        '<h1 style="font-size:30px">' + decoIcon(day.deco, "deco") + ' ' + esc(day.title) + '</h1>' +
      '</div></div>' +
      '<div class="page">' +
        '<div class="event-list">' + events + '</div>' +
        note +
      '</div>';
  }

  function viewEvent(dayId, eventId) {
    var day = findDay(dayId);
    var ev = findEvent(day, eventId);
    if (!day || !ev) return viewNotFound();

    var dot = day.theme === "sea" ? "var(--sea)" : "var(--rome)";
    var dotSoft = day.theme === "sea" ? "var(--sea-soft)" : "var(--rome-soft)";

    var detailRows = "";
    if (ev.detail) {
      Object.keys(ev.detail).forEach(function (k) {
        detailRows += '<div class="row"><span class="field-label" style="display:inline">' + esc(k) + '</span><strong>' + esc(ev.detail[k]) + '</strong></div>';
      });
    }

    var confirmation = ev.confirmation ? '<div class="row"><span>Confirmation</span><span class="code" style="--dot:' + dot + ';--dot-soft:' + dotSoft + '">' + esc(ev.confirmation) + '</span></div>' : "";

    var actions = "";
    if (ev.pdf || ev.mapQuery || ev.phone) {
      actions = '<div class="actions">';
      if (ev.pdf) actions += '<a class="btn" href="' + ev.pdf + '" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><use href="#icon-pdf"/></svg>Confirmation</a>';
      if (ev.mapQuery) actions += '<a class="btn" href="https://www.google.com/maps/search/?api=1&query=' + ev.mapQuery + '" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><use href="#icon-map"/><use href="#icon-map-dot"/></svg>Map</a>';
      if (ev.phone) actions += '<a class="btn" href="tel:' + ev.phone + '"><svg viewBox="0 0 24 24"><use href="#icon-phone"/></svg>' + esc(ev.host || "Call") + '</a>';
      actions += '</div>';
    }

    var stub = '<div class="stub">Transport to/from this ' + (ev.type === "stay" ? "stay" : "event") + ' isn’t recorded yet — space is ready here once it is.</div>';

    return '<div class="page" style="padding-top:20px">' +
      '<a class="back" href="#/day/' + day.id + '">' + backChevron() + ' ' + esc(day.title) + '</a>' +
      '<div class="crumbs"><a href="#/">All days</a> &rsaquo; <a href="#/day/' + day.id + '">' + esc(day.when) + '</a> &rsaquo; ' + esc(ev.title) + '</div>' +
      '<div class="event-hero" style="--dot:' + dot + ';--dot-soft:' + dotSoft + '">' +
        '<span class="event-icon"><svg viewBox="0 0 24 24"><use href="#' + eventIconId(ev.type) + '"/></svg></span>' +
        '<div><div class="event-kicker" style="--dot:' + dot + '">' + esc(ev.type) + '</div><h2>' + esc(ev.title) + '</h2></div>' +
      '</div>' +
      '<div class="card" style="--dot:' + dot + '">' +
        detailRows +
        confirmation +
        (ev.address ? '<span class="note">' + esc(ev.address) + '</span>' : "") +
        actions +
      '</div>' +
      stub +
    '</div>';
  }

  function viewNotFound() {
    return '<div class="page" style="padding-top:40px;text-align:center">' +
      '<p>That page wandered off somewhere between Rome and Amalfi.</p>' +
      '<a class="back" href="#/" style="justify-content:center">' + backChevron() + ' Back to the itinerary</a>' +
    '</div>';
  }

  /* =========================================================
     ROUTER
  ========================================================= */
  function route() {
    var hash = location.hash.replace(/^#\/?/, "");
    var parts = hash.split("/").filter(Boolean);
    var view = document.getElementById("view");
    if (!view) return;

    var html;
    if (parts[0] === "day" && parts[1] && parts[2] === "event" && parts[3]) {
      html = viewEvent(decodeURIComponent(parts[1]), decodeURIComponent(parts[3]));
    } else if (parts[0] === "day" && parts[1]) {
      html = viewDay(decodeURIComponent(parts[1]));
    } else {
      html = viewOverview();
    }

    view.innerHTML = html;
    // restart the fade-in animation on every navigation
    view.style.animation = "none";
    void view.offsetWidth;
    view.style.animation = "";
    window.scrollTo(0, 0);
  }

  window.addEventListener("hashchange", route);
})();
</script>

</body>
</html>
