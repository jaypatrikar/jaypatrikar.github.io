<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Rome &amp; Amalfi Coast</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  /*
    Deliberately single-theme: a white-and-pastel, hand-tied-bouquet look.
    Inverting this to a dark palette would undo the point of it, so the
    same soft palette is kept under prefers-color-scheme/data-theme rather
    than flipping to a dark ground.
  */
  :root, :root[data-theme="dark"], :root[data-theme="light"] {
    --bg: #f6efe3;
    --bg-raised: #fffbf3;
    --ink: #5c4a53;
    --ink-soft: #ad93a0;
    --line: #ecdfd0;
    --rome: #e0879e;
    --rome-soft: #fbeae2;
    --sea: #96b9a3;
    --sea-soft: #eef3e6;
    --gold: #d9b56e;
    --lavender: #c9b7db;
    --lemon: #eecb5e;
    --lemon-leaf: #a3c08a;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.5;
    min-height: 100vh;
  }
  a { color: inherit; }
  button { font: inherit; }

  /* ---------- Gate ---------- */
  #gate {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background: radial-gradient(ellipse at 50% 0%, var(--rome-soft), var(--bg) 65%);
  }
  #gate-card {
    width: 100%;
    max-width: 320px;
    background: var(--bg-raised);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 36px 28px 30px;
    box-shadow: 0 20px 50px -25px rgba(150, 100, 120, 0.28);
    text-align: center;
  }
  .route { position: relative; height: 34px; margin: 0 auto 20px; max-width: 220px; }
  .route svg { display: block; width: 100%; height: 100%; overflow: visible; }
  .route .dashes { stroke: var(--gold); stroke-width: 1.5; stroke-dasharray: 3 5; fill: none; }
  .route .plane {
    fill: var(--ink); transform-box: fill-box; transform-origin: center;
    animation: fly 3.2s ease-in-out infinite;
  }
  @keyframes fly {
    0%   { transform: translate(0px, 0px) rotate(6deg); opacity: 0; }
    8%   { opacity: 1; }
    50%  { transform: translate(51px, -21px) rotate(6deg); opacity: 1; }
    92%  { opacity: 1; }
    100% { transform: translate(102px, 0px) rotate(6deg); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .route .plane { animation: none; transform: translate(51px, -21px) rotate(6deg); }
  }
  #gate form { display: flex; flex-direction: column; gap: 12px; }
  #gate p.label {
    text-transform: uppercase; letter-spacing: 0.14em; font-size: 11.5px;
    color: var(--rome); font-weight: 700; margin: 0 0 2px;
  }
  #gate h2 {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-size: 22px; margin: 0 0 16px; line-height: 1.25;
  }
  #gate input {
    font-size: 16px; padding: 13px 14px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--bg); color: var(--ink); text-align: center; letter-spacing: 0.04em;
  }
  #gate input:focus { outline: 2px solid var(--rome); outline-offset: 1px; }
  #gate button.submit {
    font-size: 15px; font-weight: 600; padding: 13px 14px; border-radius: 10px; border: none;
    background: var(--rome); color: #fff8f2; cursor: pointer;
  }
  #gate button.submit:active { transform: scale(0.98); }
  #gate button.submit:focus-visible { outline: 2px solid var(--ink); outline-offset: 2px; }
  #gate .error { color: var(--rome); font-size: 13px; min-height: 16px; margin: 2px 0 0; }

  /* ---------- App shell ---------- */
  #content { display: none; }
  #view { animation: fadein 0.32s ease both; }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    #view { animation: none; }
  }

  .hero {
    position: relative; padding: 56px 20px 36px; text-align: center;
    background: linear-gradient(180deg, var(--rome-soft), transparent 75%);
    overflow: hidden;
  }
  .hero.compact { padding: 26px 20px 22px; }
  .hero .florals { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  .hero .inner { position: relative; z-index: 1; }
  .eyebrow {
    text-transform: uppercase; letter-spacing: 0.18em; font-size: 12px;
    color: var(--rome); font-weight: 700; margin: 0 0 12px;
  }
  h1 {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
    font-size: 40px; line-height: 1.1; margin: 0 0 10px; text-wrap: balance; letter-spacing: -0.01em;
  }
  .subtitle { font-family: Georgia, "Palatino Linotype", serif; font-style: italic; color: var(--ink-soft); font-size: 17px; margin: 0 0 6px; }
  .dates { color: var(--ink-soft); font-size: 14px; font-variant-numeric: tabular-nums; letter-spacing: 0.03em; }
  .rule-flowers { width: 92px; height: auto; margin: 22px auto 0; display: block; }
  .map-link {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 18px;
    font-size: 13px; font-weight: 700; color: var(--rome); text-decoration: none;
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: 20px;
    padding: 8px 16px;
  }
  .map-link svg { width: 15px; height: 15px; }

  /* ---- Trip map ---- */
  .map-sub { font-size: 13px; color: var(--ink-soft); margin: 0 0 14px; }
  #trip-map {
    height: 62vh; min-height: 340px; border-radius: 14px; overflow: hidden;
    border: 1px solid var(--line); background: var(--bg-raised);
  }
  .leaflet-popup-content-wrapper { background: var(--bg-raised); color: var(--ink); border-radius: 10px; }
  .leaflet-popup-tip { background: var(--bg-raised); }
  .map-popup { font-size: 13px; line-height: 1.5; }
  .map-popup strong { display: block; font-size: 13.5px; margin-bottom: 3px; }
  .map-popup a { color: var(--rome); font-weight: 600; text-decoration: none; }
  .map-popup a:hover { text-decoration: underline; }
  .map-legend {
    display: flex; flex-wrap: wrap; gap: 14px; margin-top: 14px; font-size: 12px; color: var(--ink-soft);
  }
  .map-legend span { display: inline-flex; align-items: center; gap: 6px; }
  .map-legend i { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .page { max-width: 620px; margin: 0 auto; padding: 8px 16px 80px; }

  /* breadcrumb / back link */
  .back {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13.5px; font-weight: 600; color: var(--rome);
    text-decoration: none; padding: 6px 2px; margin-bottom: 4px;
  }
  .back svg { width: 15px; height: 15px; }
  .crumbs { font-size: 12.5px; color: var(--ink-soft); margin: 2px 0 18px; }
  .crumbs a { color: var(--ink-soft); text-decoration: underline; text-decoration-color: var(--line); text-underline-offset: 2px; }

  /* ---- Overview: list of days ---- */
  .timeline { position: relative; display: flex; flex-direction: column; gap: 0; padding-top: 12px; }
  .timeline::before { content: ""; position: absolute; top: 8px; bottom: 8px; left: 5px; width: 1px; background: var(--line); }
  .leg { position: relative; padding: 0 0 6px 30px; }
  .leg::before {
    content: ""; position: absolute; left: 0; top: 7px; width: 11px; height: 11px;
    border-radius: 50%; background: var(--bg-raised); border: 2px solid var(--dot, var(--rome));
  }
  .leg.sea { --dot: var(--sea); }

  .day-link {
    display: block; text-decoration: none; color: inherit;
    background: var(--bg-raised); border: 1px solid var(--line); border-left: 3px solid var(--dot, var(--rome));
    border-radius: 4px 12px 12px 4px; padding: 15px 16px; margin-bottom: 24px;
  }
  .day-link:active { transform: scale(0.99); }
  .leg-when { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0.04em; margin-bottom: 4px; color: var(--dot, var(--rome)); }
  .leg-title {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-size: 21px; margin: 0 0 6px; text-wrap: balance; line-height: 1.2;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .leg-title .lt-left { display: flex; align-items: center; gap: 8px; }
  .deco { width: 19px; height: 19px; flex-shrink: 0; display: inline-block; vertical-align: -3px; }
  .leg-title .chev { width: 16px; height: 16px; color: var(--ink-soft); flex-shrink: 0; }
  .leg-sub { font-size: 13.5px; color: var(--ink-soft); }
  .leg-sub .count { font-variant-numeric: tabular-nums; }

  /* ---- Day view: list of events ---- */
  .event-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .event-link {
    display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit;
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: 12px; padding: 13px 14px;
  }
  .event-link:active { transform: scale(0.99); }
  .event-icon {
    flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: var(--dot-soft, var(--rome-soft)); color: var(--dot, var(--rome));
  }
  .event-icon svg { width: 17px; height: 17px; }
  .event-text { flex: 1; min-width: 0; }
  .event-title { font-weight: 600; font-size: 14.5px; }
  .event-meta { font-size: 12.5px; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .event-link .chev { width: 15px; height: 15px; color: var(--ink-soft); flex-shrink: 0; }

  /* ---- Hour-by-hour schedule ---- */
  .sched-heading {
    margin: 18px 0 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink-soft); font-weight: 700;
  }
  .sched-sub { font-size: 12px; color: var(--ink-soft); margin: 0 0 12px; font-style: italic; }
  .sched-row { position: relative; display: flex; gap: 12px; padding: 0 0 16px 0; }
  .sched-row:last-child { padding-bottom: 0; }
  .sched-time {
    flex-shrink: 0; width: 46px; font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums;
    color: var(--dot, var(--rome)); padding-top: 1px;
  }
  .sched-rail { flex-shrink: 0; width: 10px; display: flex; flex-direction: column; align-items: center; }
  .sched-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dot, var(--rome)); margin-top: 4px; flex-shrink: 0; }
  .sched-line { flex: 1; width: 1px; background: var(--line); margin-top: 3px; }
  .sched-row:last-child .sched-line { display: none; }
  .sched-body { flex: 1; padding-bottom: 2px; }
  .sched-title { font-weight: 600; font-size: 14px; }
  .sched-link { display: inline-flex; align-items: center; gap: 4px; text-decoration: none; color: var(--dot, var(--rome)); }
  .sched-link:hover { text-decoration: underline; }
  .sched-link svg { width: 12px; height: 12px; flex-shrink: 0; }
  .sched-note { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; line-height: 1.4; }

  .day-note {
    margin-top: 16px; padding: 12px 14px; border-radius: 10px;
    background: var(--sea-soft); color: var(--ink); font-size: 13.5px; font-style: italic;
    display: flex; gap: 8px; align-items: flex-start;
  }
  .warn {
    margin-top: 16px; padding: 13px 14px; border-radius: 10px;
    background: #fbe4d8; border: 1px solid #edb896; color: #7a3c1e; font-size: 13.5px;
    display: flex; gap: 8px; align-items: flex-start; line-height: 1.45;
  }
  .warn strong { display: block; margin-bottom: 2px; }

  /* ---- Ideas to explore (alternates, not booked) ---- */
  .ideas-heading {
    margin: 28px 0 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink-soft); font-weight: 700; display: flex; align-items: center; gap: 6px;
  }
  .ideas-sub { font-size: 12.5px; color: var(--ink-soft); margin: 0 0 12px; }
  .idea-group { margin-bottom: 18px; }
  .idea-group-label {
    font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--dot, var(--rome));
    font-weight: 700; margin-bottom: 8px;
  }
  .idea-card {
    display: flex; align-items: flex-start; gap: 10px;
    background: var(--bg-raised); border: 1px solid var(--line); border-radius: 10px;
    padding: 11px 13px; margin-bottom: 8px;
  }
  .idea-main { flex: 1; min-width: 0; }
  .idea-title { font-weight: 600; font-size: 14px; }
  .idea-title a { text-decoration: none; color: var(--dot, var(--rome)); }
  .idea-title a:hover { text-decoration: underline; }
  .idea-note { font-size: 12.5px; color: var(--ink-soft); margin-top: 2px; }
  .pill {
    display: inline-block; font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
    padding: 2px 7px; border-radius: 20px; margin-top: 6px;
    background: #fbe4d8; color: #7a3c1e;
  }
  .idea-go { flex-shrink: 0; color: var(--ink-soft); }
  .idea-go svg { width: 15px; height: 15px; }

  /* ---- Event view: detail card ---- */
  .event-hero { display: flex; align-items: center; gap: 12px; margin: 6px 0 18px; }
  .event-hero .event-icon { width: 46px; height: 46px; }
  .event-hero .event-icon svg { width: 21px; height: 21px; }
  .event-hero h2 {
    font-family: Georgia, "Iowan Old Style", "Palatino Linotype", serif;
    font-size: 23px; margin: 0; line-height: 1.2; text-wrap: balance;
  }
  .event-hero .event-kicker { font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--dot, var(--rome)); font-weight: 700; margin-bottom: 3px; }

  .card {
    background: var(--bg-raised); border: 1px solid var(--line); border-left: 3px solid var(--dot, var(--rome));
    border-radius: 4px 12px 12px 4px; padding: 16px 17px; font-size: 14.5px; color: var(--ink-soft);
    display: flex; flex-direction: column; gap: 8px;
  }
  .card strong { color: var(--ink); font-weight: 600; }
  .card .row { display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
  .code {
    font-variant-numeric: tabular-nums; background: var(--dot-soft, var(--rome-soft)); color: var(--dot, var(--rome));
    padding: 2px 8px; border-radius: 5px; font-size: 12.5px; font-weight: 700; letter-spacing: 0.02em; display: inline-block;
  }
  .note { font-style: italic; color: var(--ink-soft); font-size: 13.5px; }
  .field-label { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-soft); margin-bottom: 1px; }

  .actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
  .btn {
    flex: 1 1 auto; min-width: 0; text-align: center; text-decoration: none; font-size: 13px; font-weight: 600;
    padding: 10px 12px; border-radius: 8px; background: var(--bg); border: 1px solid var(--line); color: var(--ink);
    display: flex; align-items: center; justify-content: center; gap: 6px; min-height: 40px;
  }
  .btn svg { width: 14px; height: 14px; flex-shrink: 0; }
  .btn:active { transform: scale(0.97); }

  .stub {
    margin-top: 18px; padding: 13px 14px; border: 1px dashed var(--line); border-radius: 10px;
    font-size: 13px; color: var(--ink-soft); font-style: italic;
  }

  footer {
    max-width: 620px; margin: 48px auto 0; padding: 20px 16px 40px; border-top: 1px solid var(--line);
    font-size: 13px; color: var(--ink-soft); text-align: center;
  }

  @media (max-width: 480px) {
    h1 { font-size: 30px; }
    .subtitle { font-size: 15px; }
    .leg-title { font-size: 19px; }
    .hero { padding: 44px 16px 30px; }
  }
</style>
</head>
<body>

<div id="gate">
  <div id="gate-card">
    <div class="route">
      <svg viewBox="0 0 114 30">
        <defs>
          <g id="blossom">
            <circle cx="0" cy="-4.2" r="3.1"/><circle cx="4" cy="-1.3" r="3.1"/><circle cx="2.5" cy="3.4" r="3.1"/>
            <circle cx="-2.5" cy="3.4" r="3.1"/><circle cx="-4" cy="-1.3" r="3.1"/><circle cx="0" cy="0" r="2" fill="var(--gold)"/>
          </g>
        </defs>
        <path class="dashes" d="M6 24 Q 57 -6 108 24"/>
        <use href="#blossom" x="6" y="24" fill="var(--rome)" transform="scale(0.6)" style="transform-origin:6px 24px"/>
        <use href="#blossom" x="108" y="24" fill="var(--sea)" transform="scale(0.6)" style="transform-origin:108px 24px"/>
        <g class="plane"><path d="M0 4 L11 4.7 L18 -0.5 L20.3 0 L16.7 6 L21 8.7 L21 10.3 L15.3 9 L11.8 12.6 L9.3 12 L11 7.3 L0 5.6 Z" transform="translate(-1 -6) rotate(6)"/></g>
      </svg>
    </div>
    <p class="label">Private itinerary</p>
    <h2>Roma &amp; Amalfi<br>await</h2>
    <form id="gate-form" autocomplete="off">
      <input type="password" id="pw" name="pw" autofocus inputmode="text" placeholder="Password">
      <button type="submit" class="submit">Unlock</button>
      <p class="error" id="gate-error"></p>
    </form>
  </div>
</div>

<div id="content">
  <!-- Shared SVG symbol defs, always present in DOM -->
  <svg width="0" height="0" style="position:absolute">
    <defs>
      <g id="bloom">
        <ellipse cx="0" cy="-7" rx="5" ry="7"/>
        <ellipse cx="6.6" cy="-2.2" rx="5" ry="7" transform="rotate(72 6.6 -2.2)"/>
        <ellipse cx="4.1" cy="5.7" rx="5" ry="7" transform="rotate(144 4.1 5.7)"/>
        <ellipse cx="-4.1" cy="5.7" rx="5" ry="7" transform="rotate(216 -4.1 5.7)"/>
        <ellipse cx="-6.6" cy="-2.2" rx="5" ry="7" transform="rotate(288 -6.6 -2.2)"/>
        <circle cx="0" cy="0" r="3.4" fill="var(--gold)"/>
      </g>
      <path id="leaf" d="M0 0 Q 6 -3 12 0 Q 6 3 0 0 Z"/>
      <g id="lemonfruit">
        <ellipse cx="0" cy="0" rx="7" ry="10"/>
        <path d="M0 -10 q -1.5 -3 0 -4.2 q 1.5 1.2 0 4.2" fill="var(--lemon-leaf)"/>
        <path d="M0 10 q 1.5 3 0 4.2 q -1.5 -1.2 0 -4.2" fill="var(--lemon-leaf)"/>
      </g>
      <g id="sailboat">
        <path d="M-13 6 Q 0 12 13 6 L 10 9 Q 0 13 -10 9 Z"/>
        <path d="M0 6 V -14" stroke="currentColor" stroke-width="1.2" fill="none"/>
        <path d="M0.5 -13 Q 9 -8 0.5 5 Z"/>
        <path d="M-0.5 -9 Q -6 -6 -0.5 2 Z" opacity="0.7"/>
      </g>
      <path id="icon-plane" d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2.5 1.5V22l4-1 4 1v-1.5L13 19v-5.5z"/>
      <g id="icon-stay" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/>
      </g>
      <path id="icon-activity" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
        d="M4 8a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v2.2a1.8 1.8 0 0 0 0 3.6V16a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2.2a1.8 1.8 0 0 0 0-3.6z"/>
      <path id="icon-chevron" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M9 18l6-6-6-6"/>
      <path id="icon-back" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/>
      <path id="icon-pdf" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6"/>
      <path id="icon-map" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
      <circle id="icon-map-dot" cx="12" cy="10" r="3" fill="none" stroke="currentColor" stroke-width="2"/>
      <path id="icon-phone" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"

  function findDay(id) { for (var i = 0; i < TRIP.days.length; i++) if (TRIP.days[i].id === id) return TRIP.days[i]; return null; }

    if (deco === "boat") return '<svg class="' + cls + '" viewBox="0 0 20 20"><use href="#sailboat" x="10" y="10" fill="var(--sea)" color="var(--sea)" transform="scale(0.75)" style="transform-origin:10px 10px"/></svg>';

    return "";
  }

  function eventIconId(type) {

        '</a>' +

    }).join("");

    return '<div class="hero">' + heroFlorals() +
      '<div class="inner">' +

  function viewDay(dayId) {
    var day = findDay(dayId);
    if (!day) return viewNotFound();

    var events = day.events.map(function (ev) {
      var dotSoft = day.theme === "sea" ? "var(--sea-soft)" : "var(--rome-soft)";
      var dot = day.theme === "sea" ? "var(--sea)" : "var(--rome)";
      return '<a class="event-link" href="#/day/' + day.id + '/event/' + ev.id + '" style="--dot:' + dot + ';--dot-soft:' + dotSoft + '">' +
        '<span class="event-icon"><svg viewBox="0 0 24 24"><use href="#' + eventIconId(ev.type) + '"/></svg></span>' +
        '<span class="event-text"><span class="event-title">' + esc(ev.title) + '</span><br><span class="event-meta">' + esc(ev.summary) + '</span></span>' +
        chevron() +
      '</a>';
    }).join("");

    var note = day.note ? '<div class="day-note">&#127811; ' + day.note + '</div>' : "";
    var schedule = renderSchedule(day);
    var ideas = renderIdeas(day);
    var eventsBlock = events ? '<div class="event-list">' + events + '</div>' : "";

    return '<div class="hero compact ' + (day.theme === "sea" ? "" : "") + '">' + heroFlorals() +
      '<div class="inner">' +
        '<a class="back" href="#/">' + backChevron() + ' All days</a>' +
        '<a class="back" href="#/map" style="float:right">' + esc("Map") + '</a>' +
        '<p class="eyebrow">' + esc(day.when) + '</p>' +
        '<h1 style="font-size:30px">' + decoIcon(day.deco, "deco") + ' ' + esc(day.title) + '</h1>' +
      '</div></div>' +
      '<div class="page">' +
        eventsBlock +
        note +
        schedule +
        ideas +
      '</div>';
  }

  /* Hour-by-hour plan for a day: day.schedule = [{time, title, note}] */
  function renderSchedule(day) {
    if (!day.schedule || !day.schedule.length) return "";
    var dot = day.theme === "sea" ? "var(--sea)" : "var(--rome)";
    var rows = day.schedule.map(function (block) {
      var titleHtml = block.link
        ? '<a href="' + block.link + '" target="_blank" rel="noopener" class="sched-link">' + esc(block.title) + ' <svg viewBox="0 0 24 24"><use href="#icon-external"/></svg></a>'
        : esc(block.title);
      return '<div class="sched-row">' +
        '<div class="sched-time">' + esc(block.time) + '</div>' +
        '<div class="sched-rail"><div class="sched-dot"></div><div class="sched-line"></div></div>' +
        '<div class="sched-body"><div class="sched-title">' + titleHtml + '</div>' +
        (block.note ? '<div class="sched-note">' + esc(block.note) + '</div>' : "") +
        '</div>' +
      '</div>';
    }).join("");
    return '<div class="sched-heading" style="color:' + dot + '">Today’s plan</div>' +
      '<p class="sched-sub">A draft, not locked in — swap anything.</p>' +
      '<div class="sched-list" style="--dot:' + dot + '">' + rows + '</div>';
  }

  /* Alternates worth exploring but not booked yet — grouped by category, each
     an outbound link so Suchita and Jay can browse before deciding together. */
  function renderIdeas(day) {
    if (!day.ideas || !day.ideas.length) return "";
    var dot = day.theme === "sea" ? "var(--sea)" : "var(--rome)";

    var groups = {};
    var order = [];
    day.ideas.forEach(function (idea) {
      if (!groups[idea.category]) { groups[idea.category] = []; order.push(idea.category); }
      groups[idea.category].push(idea);
    });

    var groupsHtml = order.map(function (cat) {
      var cards = groups[cat].map(function (idea) {
        var pill = idea.reservation ? '<span class="pill">Needs reservation</span>' : "";
        return '<div class="idea-card">' +
          '<div class="idea-main">' +
            '<div class="idea-title"><a href="' + idea.link + '" target="_blank" rel="noopener">' + esc(idea.title) + '</a></div>' +
            '<div class="idea-note">' + esc(idea.note) + '</div>' +
            pill +
          '</div>' +
          '<a class="idea-go" href="' + idea.link + '" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><use href="#icon-external"/></svg></a>' +
        '</div>';
      }).join("");
      return '<div class="idea-group"><div class="idea-group-label" style="color:' + dot + '">' + esc(cat) + '</div>' + cards + '</div>';
    }).join("");

    return '<div class="ideas-heading">' +
        '<svg style="width:14px;height:14px" viewBox="0 0 24 24"><use href="#bloom" x="12" y="12" fill="' + dot + '" transform="scale(0.5)" style="transform-origin:12px 12px"/></svg>' +
        'Ideas to explore' +
      '</div>' +
      '<p class="ideas-sub">Alternates, not booked yet — follow the links, decide together, we’ll lock it in later.</p>' +
      groupsHtml;
  }

  function initTripMap() {

    if (TRIP_MAP_INSTANCE) { TRIP_MAP_INSTANCE.remove(); TRIP_MAP_INSTANCE = null; }

    var map = L.map(el, { scrollWheelZoom: false });
    TRIP_MAP_INSTANCE = map;
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
      maxZoom: 18
    }).addTo(map);

    var colorFor = { stay: "#e0879e", sight: "#d9b56e", activity: "#96b9a3", hub: "#ad93a0" };
    var bounds = [];
    Object.keys(MAP_POINTS).forEach(function (id) {
      var pt = MAP_POINTS[id];
      bounds.push([pt.lat, pt.lng]);
      var marker = L.circleMarker([pt.lat, pt.lng], {
        radius: pt.type === "hub" ? 6 : 9,
        color: "#fffbf3",
        weight: 2,
        fillColor: colorFor[pt.type] || "#e0879e",
        fillOpacity: 0.95
      }).addTo(map);
      var link = pt.dayId ? ("#/day/" + pt.dayId + (pt.eventId ? "/event/" + pt.eventId : "")) : null;
      marker.bindPopup(
        '<div class="map-popup"><strong>' + pt.label + "</strong>" +
        (link ? '<a href="' + link + '">Open in itinerary &rarr;</a>' : "") +
        "</div>"
      );
    });

    MAP_SPINE.forEach(function (leg) {
      var a = MAP_POINTS[leg.from], b = MAP_POINTS[leg.to];
      L.polyline([[a.lat, a.lng], [b.lat, b.lng]], {
        color: "#e0879e", weight: 2, opacity: 0.7,
        dashArray: leg.mode === "flight" ? "2 8" : null
      }).addTo(map);
    });

    MAP_SIDE_LINKS.forEach(function (pair) {
      var a = MAP_POINTS[pair[0]], b = MAP_POINTS[pair[1]];
      L.polyline([[a.lat, a.lng], [b.lat, b.lng]], {
        color: "#96b9a3", weight: 1.5, opacity: 0.55, dashArray: "1 6"
      }).addTo(map);
    });

    map.fitBounds(bounds, { padding: [28, 28] });
  }

  function viewNotFound() {
    return '<div class="page" style="padding-top:40px;text-align:center">' +
      '<p>That page wandered off somewhere between Rome and Amalfi.</p>' +
      '<a class="back" href="#/" style="justify-content:center">' + backChevron() + ' Back to the itinerary</a>' +
    '</div>';
  }

  /* =========================================================
     ROUTER
  ========================================================= */
  function route() {
    var hash = location.hash.replace(/^#\/?/, "");
    var parts = hash.split("/").filter(Boolean);
    var view = document.getElementById("view");
    if (!view) return;

    var html;
    if (parts[0] === "day" && parts[1] && parts[2] === "event" && parts[3]) {
      html = viewEvent(decodeURIComponent(parts[1]), decodeURIComponent(parts[3]));
    } else if (parts[0] === "day" && parts[1]) {
      html = viewDay(decodeURIComponent(parts[1]));
    } else if (parts[0] === "map") {
      html = viewMap();
    } else {
      html = viewOverview();
    }

    view.innerHTML = html;
    // restart the fade-in animation on every navigation
    view.style.animation = "none";
    void view.offsetWidth;
    view.style.animation = "";
    window.scrollTo(0, 0);

    if (parts[0] === "map") setTimeout(initTripMap, 0);
  }

  window.addEventListener("hashchange", route);
})();
</script>

</body>
</html>
